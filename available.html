
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paintings - Ricardo Wagner</title>

<style>

body{
  margin:0;
  background:#e9e9e9;
  font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
.top{
  text-align:center;
  padding:40px 0 20px;
  letter-spacing:12px;
  font-size:38px;
  color:#9a9a9a;
}

.top a{
  text-decoration:none;
  color:#9a9a9a;
}

/* GRID OBRAS */
.gallery{
  width:90%;
  max-width:1200px;
  margin:0 auto 80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.gallery img{
  width:100%;
  display:block;
}

/* MOBILE */
@media(max-width:768px){

  .top{
    font-size:28px;
    letter-spacing:8px;
    padding-top:30px;
  }

  .gallery{
    width:92%;
    gap:18px;
  }
}

</style>
</head>

<body>

<div class="top">
  <a href="index.html">RICARDO WAGNER</a>
</div>

<section class="gallery">

  <img src="images/painting1.jpg">
  <img src="images/painting2.jpg">
  <img src="images/painting3.jpg">
  <img src="images/painting4.jpg">

</section>

</body>
</html>
