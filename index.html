<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
height:88px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 55px;
z-index:1000;
}

.logo{
font-size:50px;
font-weight:700;
line-height:.9;
letter-spacing:-1px;
}

nav{
display:flex;
align-items:center;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:30px;
font-size:13px;
font-weight:500;
letter-spacing:.4px;
text-transform:uppercase;
opacity:.95;
transition:opacity .3s;
}

nav a:hover{
opacity:.55;
}

/* ===== HERO ===== */
.hero{
margin-top:88px;
width:100%;
height:calc(100vh - 88px);
position:relative;
overflow:hidden;
}

/* overlay Kelly */
.menu-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:38%;
background:linear-gradient(
to bottom,
rgba(255,255,255,0.18),
rgba(255,255,255,0)
);
opacity:0;
transition:opacity .35s ease;
pointer-events:none;
z-index:5;
}

header:hover + .hero .menu-overlay{
opacity:1;
}

/* ===== SLIDER ===== */
.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
animation:fade 24s infinite;
transform:scale(1.03);
}

.slide:nth-child(2){background-image:url("images/cabeza11.jpg");animation-delay:0s;}
.slide:nth-child(3){background-image:url("images/cabeza12.jpg");animation-delay:6s;}
.slide:nth-child(4){background-image:url("images/cabeza4.jpg");animation-delay:12s;}
.slide:nth-child(5){background-image:url("images/cabeza7.jpg");animation-delay:18s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
24%{opacity:1;}
30%{opacity:0;}
100%{opacity:0;}
}

/* ===== TEXTO HERO ===== */
.hero-text{
position:absolute;
left:55px;
bottom:50px;
font-size:42px;
font-weight:300;
letter-spacing:.2px;
line-height:1.2;
max-width:760px;
z-index:10;
text-shadow:0 2px 8px rgba(0,0,0,.45);
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
padding:0 18px;
height:78px;
}

.logo{
font-size:24px;
}

nav a{
font-size:11px;
margin-left:10px;
}

.hero{
margin-top:78px;
height:calc(100vh - 78px);
}

.hero-text{
left:20px;
bottom:28px;
font-size:30px;
max-width:90%;
}
}
</style>
</head>

<body>

<header>
<div class="logo">RICARDO<br>WAGNER</div>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="hero">

<div class="menu-overlay"></div>

<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>

<div class="hero-text">
Painting as an exploration of existence and the infinite
</div>

</section>

</body>
</html>
