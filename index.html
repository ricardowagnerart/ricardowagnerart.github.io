<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
z-index:1000;
}

.logo{
font-weight:700;
font-size:28px;
letter-spacing:1px;
color:#111;
text-decoration:none;
}

nav ul{
display:flex;
list-style:none;
gap:40px;
}

nav a{
text-decoration:none;
color:#111;
font-weight:600;
font-size:15px;
letter-spacing:1px;
}

/* ===== HERO ===== */
.hero{
margin-top:70px;
height:calc(100vh - 70px);
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-slides{
position:absolute;
inset:0;
z-index:1;
}

.hero-slides img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:fade 20s infinite;
}

.hero-slides img:nth-child(1){animation-delay:0s;}
.hero-slides img:nth-child(2){animation-delay:5s;}
.hero-slides img:nth-child(3){animation-delay:10s;}
.hero-slides img:nth-child(4){animation-delay:15s;}

@keyframes fade{
0%{opacity:0;}
10%{opacity:1;}
25%{opacity:1;}
35%{opacity:0;}
100%{opacity:0;}
}

.hero-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.25);
z-index:2;
}

.hero-content{
position:relative;
z-index:3;
color:#fff;
}

.hero h1{
font-size:clamp(2.2rem,6vw,6rem);
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:14px;
animation:floatName 6s ease-in-out infinite;
}

@keyframes floatName{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.hero p{
font-size:clamp(1rem,2vw,1.4rem);
letter-spacing:.5px;
opacity:.9;
transition:all .4s ease;
}

.hero:hover p{
opacity:1;
transform:translateY(-4px);
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
padding:0 20px;
}

.logo{
font-size:22px;
}

nav ul{
gap:18px;
}

nav a{
font-size:13px;
}

.hero h1{
font-size:clamp(2rem,11vw,4rem);
}

.hero p{
font-size:clamp(.95rem,4vw,1.2rem);
}
}
</style>
</head>

<body>

<header>
<a class="logo" href="index.html">RICARDO WAGNER</a>

<nav>
<ul>
<li><a href="index.html">HOME</a></li>
<li><a href="works.html">WORKS</a></li>
<li><a href="biography.html">BIOGRAPHY</a></li>
<li><a href="contact.html">CONTACT</a></li>
</ul>
</nav>
</header>

<section class="hero">

<div class="hero-slides">
<img src="images/cabeza13.jpg">
<img src="images/cabeza11.jpg">
<img src="images/cabeza7.jpg">
<img src="images/cabeza12.jpg">
</div>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>RICARDO WAGNER</h1>
<p>Visual Artist — Abstraction, Matter & Infinity</p>
</div>

</section>

</body>
</html>
