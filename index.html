<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== HEADER DESKTOP ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
z-index:1000;
}

.logo{
font-size:52px;
font-weight:bold;
line-height:0.9;
color:#fff;
text-decoration:none;
}

nav{
display:flex;
gap:40px;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
}

/* ===== HERO ===== */

.hero{
height:100vh;
background:url("images/slider1.jpg") center/cover no-repeat;
display:flex;
align-items:flex-end;
padding:80px;
}

.hero h1{
color:#fff;
font-size:64px;
font-weight:300;
max-width:700px;
}

/* ===== MOBILE CENTER NAME ===== */

.mobile-center{
display:none;
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
color:#fff;
font-size:42px;
font-weight:bold;
text-align:center;
line-height:0.9;
z-index:1200;
cursor:pointer;
}

/* ===== MOBILE FULL MENU ===== */

.mobile-menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5f5f5;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:35px;
z-index:2000;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.mobile-menu.active{
opacity:1;
pointer-events:auto;
}

.mobile-menu a{
text-decoration:none;
font-size:42px;
font-weight:300;
color:#888;
}

.mobile-menu a.sub{
font-size:34px;
color:#111;
}

.close{
position:absolute;
top:30px;
right:30px;
font-size:45px;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

header{
display:none;
}

.mobile-center{
display:block;
}

.hero{
padding:30px;
align-items:flex-end;
}

.hero h1{
font-size:48px;
}

}

</style>
</head>

<body>

<!-- DESKTOP HEADER -->
<header>
<a href="index.html" class="logo">RICARDO<br>WAGNER</a>

<nav>
<a href="biography.html">BIOGRAPHY</a>
<a href="works.html">WORKS</a>
<a href="philosophy.html">PHILOSOPHY</a>
<a href="exhibitions.html">EXHIBITIONS</a>
<a href="publications.html">PUBLICATIONS</a>
</nav>
</header>

<!-- MOBILE CENTER NAME -->
<div class="mobile-center" onclick="openMenu()">
RICARDO<br>WAGNER
</div>

<!-- HERO -->
<section class="hero">
<h1>Painting as an exploration of existence and the infinite</h1>
</section>

<!-- MOBILE FULL MENU -->
<div class="mobile-menu" id="mobileMenu">

<div class="close" onclick="closeMenu()">✕</div>

<a href="biography.html">Biography</a>

<a href="works.html">Works</a>
<a class="sub" href="works.html#paintings">Paintings</a>
<a class="sub" href="works.html#drawings">Drawings</a>
<a class="sub" href="works.html#watercolors">Watercolors</a>
<a class="sub" href="works.html#photography">Photography</a>

<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>

</div>

<script>

function openMenu(){
document.getElementById("mobileMenu").classList.add("active");
}

function closeMenu(){
document.getElementById("mobileMenu").classList.remove("active");
}

</script>

</body>
</html>
