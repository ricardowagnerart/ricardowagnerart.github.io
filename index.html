<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
background:#000;
color:#fff;
}

/* ===== SLIDER ===== */

.hero{
position:relative;
height:100vh;
width:100%;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
animation:fade 18s infinite;
}

.slide:nth-child(1){
background-image:url("images/cabeza11.jpg");
animation-delay:0s;
}
.slide:nth-child(2){
background-image:url("images/cabeza12.jpg");
animation-delay:6s;
}
.slide:nth-child(3){
background-image:url("images/cabeza4.jpg");
animation-delay:12s;
}

@keyframes fade{
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

/* ===== OVERLAY ===== */

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
z-index:1;
}

/* ===== NOMBRE CENTRO ===== */

.center-name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:5;
text-align:center;
cursor:pointer;
}

.center-name h1{
font-size:64px; /* reducido 40% */
line-height:.95;
letter-spacing:2px;
}

/* ===== TEXTO SECUNDARIO ===== */

.subtitle{
position:absolute;
bottom:7%;
left:50%;
transform:translateX(-50%);
z-index:5;
font-size:24px;
opacity:.8; /* 20% transparencia */
white-space:nowrap;
}

/* ===== MENU FULLSCREEN ===== */

.fullmenu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f3f3;
color:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:28px;
font-size:34px;
font-weight:300;
opacity:0;
pointer-events:none;
transition:.4s;
z-index:50;
}

.fullmenu.active{
opacity:1;
pointer-events:auto;
}

.fullmenu a{
text-decoration:none;
color:#111;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.center-name h1{
font-size:56px;
}

.subtitle{
font-size:22px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>

<div class="center-name" onclick="openMenu()">
<h1>RICARDO<br>WAGNER</h1>
</div>

<div class="subtitle">
Painting as an exploration of existence and the infinite
</div>

</section>

<!-- MENU FULLSCREEN -->

<div class="fullmenu" id="menu">
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
<a href="#" onclick="closeMenu()">Close ✕</a>
</div>

<script>

function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

</script>

</body>
</html>
