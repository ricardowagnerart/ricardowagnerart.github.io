<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:90px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

nav ul{
    display:flex;
    list-style:none;
    gap:50px;
}

nav ul li a{
    position:relative;
    display:inline-block;
    color:#fff;
    text-decoration:none;
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    transition:transform .35s ease;
}

nav ul li a:hover{
    transform:translateY(-3px);
}

/* ===== HERO ===== */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* ===== SLIDER ===== */
.slider{
    position:absolute;
    top:90px;
    left:0;
    width:100%;
    height:calc(100vh - 170px);
    overflow:hidden;
}

/* velo blanco SOLO cuando hover en menú */
.slider::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.28) 0%,
        rgba(255,255,255,.12) 30%,
        rgba(255,255,255,0) 65%
    );
    opacity:0;
    transition:opacity .45s ease;
    z-index:3;
    pointer-events:none;
}

header:hover ~ .hero .slider::after{
    opacity:1;
}

/* capa blanca para fade a blanco */
.fade-white{
    position:absolute;
    inset:0;
    background:#fff;
    opacity:0;
    animation:whiteFlash 16s linear infinite;
    z-index:2;
    pointer-events:none;
}

@keyframes whiteFlash{
    0%,23%{opacity:0;}
    24%,26%{opacity:.9;}
    27%,100%{opacity:0;}
}

/* SLIDES */
/* paneo lento izquierda → derecha */
.slide{
    position:absolute;
    width:110%;
    height:100%;
    left:-5%;
    top:0;
    object-fit:cover;
    opacity:0;
    animation:
        fadeSlides 16s ease-in-out infinite,
        panLR 16s linear infinite;
    will-change:transform,opacity;
}

.slide:nth-child(1){animation-delay:0s,0s;}
.slide:nth-child(2){animation-delay:4s,4s;}
.slide:nth-child(3){animation-delay:8s,8s;}
.slide:nth-child(4){animation-delay:12s,12s;}

@keyframes fadeSlides{
    0%{opacity:0;}
    5%{opacity:1;}
    22%{opacity:1;}
    26%{opacity:0;}
    100%{opacity:0;}
}

@keyframes panLR{
    0%{transform:translateX(0);}
    100%{transform:translateX(4%);}
}

/* ===== TEXTO CENTRAL ===== */
.hero-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#fff;
    z-index:5;
}

.hero-text h1{
    font-size:90px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    white-space:nowrap;
}

.hero-text p{
    margin-top:14px;
    font-size:27px;
    font-weight:300;
    opacity:.9;
}

/* ===== COPYRIGHT ===== */
.copyright{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:12px;
    letter-spacing:.5px;
    opacity:.75;
    z-index:10;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
    nav ul{gap:25px;}
    nav ul li a{font-size:10px;}

    .hero-text h1{
        font-size:58px;
        white-space:normal;
    }

    .hero-text p{font-size:22px;}
}

@media(max-width:768px){
    header{height:75px;}

    nav ul{gap:14px;}
    nav ul li a{font-size:9px;}

    .slider{
        top:75px;
        height:calc(100vh - 140px);
    }

    .hero-text h1{
        font-size:42px;
        white-space:normal;
    }

    .hero-text p{font-size:18px;}

    .copyright{font-size:11px;}
}
</style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="biography.html">BIOGRAPHY</a></li>
            <li><a href="works.html">WORKS</a></li>
            <li><a href="philosophy.html">PHILOSOPHY</a></li>
            <li><a href="exhibitions.html">EXHIBITIONS</a></li>
            <li><a href="publications.html">PUBLICATIONS</a></li>
        </ul>
    </nav>
</header>

<section class="hero">

    <div class="slider">
        <img class="slide" src="images/cabeza11.jpg" alt="">
        <img class="slide" src="images/cabeza12.jpg" alt="">
        <img class="slide" src="images/cabeza4.jpg" alt="">
        <img class="slide" src="images/cabeza7.jpg" alt="">
        <div class="fade-white"></div>
    </div>

    <div class="hero-text">
        <h1>RICARDO WAGNER</h1>
        <p>Visual Artist — Abstraction, Matter & Infinity</p>
    </div>

    <div class="copyright">© Ricardo Wagner</div>

</section>

</body>
</html>
