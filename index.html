<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:90px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

/* menú centrado */
nav ul{
    display:flex;
    list-style:none;
    gap:50px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    font-size:11px; /* -45% aprox */
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
}

/* ===== HERO / SLIDER ===== */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.slider{
    position:absolute;
    top:90px;
    left:0;
    width:100%;
    height:calc(100vh - 170px);
}

/* transición cinematic */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transform:scale(1.06);
    animation:cinematicFade 16s ease-in-out infinite;
    filter:contrast(1.05) saturate(1.05);
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:4s;}
.slide:nth-child(3){animation-delay:8s;}
.slide:nth-child(4){animation-delay:12s;}

@keyframes cinematicFade{
    0%{
        opacity:0;
        transform:scale(1.06);
    }
    8%{
        opacity:1;
        transform:scale(1.02);
    }
    22%{
        opacity:1;
        transform:scale(1);
    }
    30%{
        opacity:0;
        transform:scale(1.04);
    }
    100%{
        opacity:0;
        transform:scale(1.06);
    }
}

/* ===== TEXTO CENTRAL ===== */
.hero-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#fff;
    z-index:5;
}

.hero-text h1{
    font-size:90px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    white-space:nowrap;
}

.hero-text p{
    margin-top:14px;
    font-size:27px;
    font-weight:300;
    opacity:.9;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
    nav ul{gap:25px;}
    nav ul li a{font-size:10px;}

    .hero-text h1{
        font-size:58px;
        white-space:normal;
    }

    .hero-text p{
        font-size:22px;
    }
}

@media(max-width:768px){
    header{height:75px;}

    nav ul{gap:14px;}

    nav ul li a{
        font-size:9px;
    }

    .slider{
        top:75px;
        height:calc(100vh - 140px);
    }

    .hero-text h1{
        font-size:42px;
        white-space:normal;
    }

    .hero-text p{
        font-size:18px;
    }
}
</style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="biography.html">BIOGRAPHY</a></li>
            <li><a href="works.html">WORKS</a></li>
            <li><a href="philosophy.html">PHILOSOPHY</a></li>
            <li><a href="exhibitions.html">EXHIBITIONS</a></li>
            <li><a href="publications.html">PUBLICATIONS</a></li>
        </ul>
    </nav>
</header>

<section class="hero">

    <div class="slider">
        <!-- imágenes llamadas cabeza -->
        <img class="slide" src="cabeza1.jpg" alt="">
        <img class="slide" src="cabeza2.jpg" alt="">
        <img class="slide" src="cabeza3.jpg" alt="">
        <img class="slide" src="cabeza4.jpg" alt="">
    </div>

    <div class="hero-text">
        <h1>RICARDO WAGNER</h1>
        <p>Visual Artist — Abstraction, Matter & Infinity</p>
    </div>

</section>

</body>
</html>
