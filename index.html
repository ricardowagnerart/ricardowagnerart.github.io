<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== SLIDER ===== */

.hero{
position:relative;
height:100vh;
width:100%;
background:url("images/cabeza11.jpg") center center / cover no-repeat;
}

/* ===== OVERLAY OSCURO ===== */

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* ===== NOMBRE CENTRADO ===== */

.center-name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
text-align:center;
pointer-events:none;
}

.center-name h1{
font-size:110px;
font-weight:700;
line-height:0.9;
letter-spacing:2px;
}

/* ===== TEXTO SECUNDARIO ===== */

.subtitle{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
z-index:10;
font-size:38px;
font-weight:300;
text-align:center;
max-width:900px;
padding:0 20px;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.center-name h1{
font-size:72px;
}

.subtitle{
font-size:22px;
max-width:90%;
line-height:1.3;
bottom:6%;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="center-name">
<h1>RICARDO<br>WAGNER</h1>
</div>

<div class="subtitle">
Painting as an exploration of existence and the infinite
</div>

</section>

</body>
</html>
