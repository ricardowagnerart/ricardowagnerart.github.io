<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
opacity:0;
animation:fadeIn .8s ease forwards;
}

/* PAGE FADE IN */
@keyframes fadeIn{
to{opacity:1;}
}

/* ===== HEADER ===== */
header{
height:74px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 52px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
text-decoration:none;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:24px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}

nav a:hover{opacity:.55;}

/* ===== HERO ===== */
.hero{
margin-top:74px;
height:calc(100vh - 74px);
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:cinema 32s infinite;
transform:scale(1.08);
}

.slide:nth-child(1){background-image:url("images/cabeza11.jpg");animation-delay:0s;}
.slide:nth-child(2){background-image:url("images/cabeza12.jpg");animation-delay:8s;}
.slide:nth-child(3){background-image:url("images/cabeza4.jpg");animation-delay:16s;}
.slide:nth-child(4){background-image:url("images/cabeza7.jpg");animation-delay:24s;}

@keyframes cinema{
0%{opacity:0;transform:scale(1.08);}
6%{opacity:1;}
24%{opacity:1;transform:scale(1);}
30%{opacity:0;}
100%{opacity:0;}
}

/* ===== MENU VEIL ===== */
.menu-fade{
position:absolute;
top:0;
left:0;
width:100%;
height:42%;
background:linear-gradient(
to bottom,
rgba(255,255,255,.35),
rgba(255,255,255,.12),
transparent
);
opacity:0;
transition:.4s;
pointer-events:none;
}

header:hover + .hero .menu-fade{
opacity:1;
}

/* ===== TEXT ===== */
.hero-text{
position:absolute;
left:52px;
bottom:48px;
font-size:36px;
font-weight:300;
line-height:1.2;
max-width:680px;
text-shadow:0 3px 12px rgba(0,0,0,.45);
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
height:68px;
padding:0 18px;
}

.logo{font-size:19px;}

nav a{
font-size:10px;
margin-left:10px;
}

.hero{
margin-top:68px;
height:calc(100vh - 68px);
}

.hero-text{
left:18px;
bottom:28px;
font-size:24px;
max-width:90%;
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="hero">

<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>

<div class="menu-fade"></div>

<div class="hero-text">
Painting as an exploration of existence and the infinite
</div>

</section>

<script>
/* ===== PAGE TRANSITION OUT ===== */
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){
const url=this.getAttribute("href");
if(url && !url.startsWith("#")){
e.preventDefault();
document.body.style.opacity="0";
setTimeout(()=>{window.location=url;},300);
}
});
});
</script>

</body>
</html>
