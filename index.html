<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== GLOBAL HEADER ===== */
header{
height:74px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 52px;
position:fixed;
top:0;left:0;
width:100%;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
text-decoration:none;
letter-spacing:.5px;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:24px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}
nav a:hover{opacity:.55;}

.hero{
margin-top:74px;
height:calc(100vh - 74px);
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:fade 24s infinite;
}

.slide:nth-child(1){background:url("images/cabeza11.jpg") center/cover;animation-delay:0s;}
.slide:nth-child(2){background:url("images/cabeza12.jpg") center/cover;animation-delay:6s;}
.slide:nth-child(3){background:url("images/cabeza4.jpg") center/cover;animation-delay:12s;}
.slide:nth-child(4){background:url("images/cabeza7.jpg") center/cover;animation-delay:18s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
24%{opacity:1;}
30%{opacity:0;}
100%{opacity:0;}
}

.menu-fade{
position:absolute;
top:0;left:0;
width:100%;
height:45%;
background:linear-gradient(to bottom,
rgba(255,255,255,.40),
rgba(255,255,255,.15),
transparent);
opacity:0;
transition:.35s;
pointer-events:none;
}

header:hover + .hero .menu-fade{
opacity:1;
}

.hero-text{
position:absolute;
left:52px;
bottom:50px;
font-size:38px;
font-weight:300;
max-width:700px;
line-height:1.2;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>
<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="hero">
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="menu-fade"></div>

<div class="hero-text">
Painting as an exploration of existence and the infinite
</div>
</section>

</body>
</html>
