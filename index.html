<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#fff;
overflow-x:hidden;
}

/* ===== HEADER ===== */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero-slides{
position:absolute;
inset:0;
z-index:1;
}

.hero-slides img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:fade 24s infinite;
}

.hero-slides img:nth-child(1){animation-delay:0s;}
.hero-slides img:nth-child(2){animation-delay:6s;}
.hero-slides img:nth-child(3){animation-delay:12s;}
.hero-slides img:nth-child(4){animation-delay:18s;}

@keyframes fade{
0%{opacity:0;}
8%{opacity:1;}
25%{opacity:1;}
33%{opacity:0;}
100%{opacity:0;}
}

.hero-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
z-index:2;
}

.hero-content{
position:relative;
z-index:3;
color:#fff;
}

.hero h1{
font-size:clamp(2.6rem,6vw,5rem);
letter-spacing:2px;
font-weight:700;
text-transform:uppercase;
animation:floatName 6s ease-in-out infinite alternate;
}

@keyframes floatName{
0%{transform:translateY(0);}
100%{transform:translateY(-8px);}
}

.hero p{
margin-top:10px;
font-size:1rem;
opacity:.85;
transition:all .4s ease;
}

.hero:hover p{
opacity:1;
transform:translateY(-3px);
}

/* ===== MENU BUTTON ===== */
.menu-btn{
position:fixed;
top:20px;
left:20px;
z-index:1000;
font-size:1.8rem;
cursor:pointer;
color:#fff;
}

/* ===== MOBILE MENU ===== */
.mobile-menu{
position:fixed;
inset:0;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:2000;
transform:translateY(-100%);
transition:.35s ease;
}

.mobile-menu.active{
transform:translateY(0);
}

.mobile-menu ul{
list-style:none;
text-align:center;
}

.mobile-menu li{
margin:14px 0;
}

.mobile-menu a{
text-decoration:none;
color:#111;
font-size:1.45rem;
font-weight:500;
}

.close-menu{
margin-top:25px;
font-size:2rem;
cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.hero h1{
font-size:3rem;
}
.hero p{
font-size:.95rem;
}
}

</style>
</head>

<body>

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="mobile-menu" id="mobileMenu">
<ul>
<li><a href="#">Biography</a></li>
<li><a href="#">Works</a></li>
<li><a href="#">Philosophy</a></li>
<li><a href="#">Exhibitions</a></li>
<li><a href="#">Publications</a></li>
</ul>
<div class="close-menu" onclick="closeMenu()">Close ✕</div>
</div>

<section class="hero">

<div class="hero-slides">
<img src="cabeza13.jpg">
<img src="cabeza11.jpg">
<img src="cabeza7.jpg">
<img src="cabeza12.jpg">
</div>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>RICARDO WAGNER</h1>
<p>Visual Artist — Abstraction, Matter & Infinity</p>
</div>

</section>

<script>
function openMenu(){
document.getElementById("mobileMenu").classList.add("active");
}
function closeMenu(){
document.getElementById("mobileMenu").classList.remove("active");
}
</script>

</body>
</html>
