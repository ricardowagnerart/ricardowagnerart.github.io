<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
overflow-x:hidden;
opacity:0;
animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{to{opacity:1;}}

/* ===== HEADER ===== */
header{
height:74px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 52px;
position:fixed;
top:0;left:0;
width:100%;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
text-decoration:none;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:24px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}

nav a:hover{opacity:.55;}

/* ===== SLIDER ===== */
.slider{
margin-top:74px;
width:100%;
height:calc(100vh - 74px);
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.2s ease;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== MENU HOVER VEIL (KELLY STYLE) ===== */
.veil{
position:absolute;
top:0;
left:0;
width:100%;
height:45%;
background:linear-gradient(to bottom,
rgba(255,255,255,.55),
rgba(255,255,255,0));
opacity:0;
pointer-events:none;
transition:.35s;
z-index:5;
}

header:hover ~ .slider .veil{
opacity:1;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
height:68px;
padding:0 18px;
}

.logo{font-size:19px;}

nav a{
font-size:10px;
margin-left:10px;
}

.slider{
margin-top:68px;
height:calc(100vh - 68px);
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="slider">

<div class="veil"></div>

<div class="slide active">
<img src="images/cabeza11.jpg" alt="">
</div>

<div class="slide">
<img src="images/cabeza12.jpg" alt="">
</div>

<div class="slide">
<img src="images/cabeza4.jpg" alt="">
</div>

<div class="slide">
<img src="images/cabeza7.jpg" alt="">
</div>

</section>

<script>
let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},4000);

document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){
const url=this.getAttribute("href");
if(url && !url.startsWith("#")){
e.preventDefault();
document.body.style.opacity="0";
setTimeout(()=>{window.location=url;},250);
}
});
});
</script>

</body>
</html>
