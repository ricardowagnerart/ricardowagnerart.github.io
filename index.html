<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== HEADER ===== */
header{
height:78px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 55px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{
font-size:28px;
font-weight:600;
letter-spacing:.4px;
color:#fff;
text-decoration:none;
white-space:nowrap;
}

nav{
display:flex;
align-items:center;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:26px;
font-size:12px;
font-weight:500;
letter-spacing:.9px;
text-transform:uppercase;
opacity:.9;
transition:opacity .3s ease;
}

nav a:hover{
opacity:.55;
}

/* ===== HERO ===== */
.hero{
margin-top:78px;
width:100%;
height:calc(100vh - 78px);
position:relative;
overflow:hidden;
}

/* ===== SLIDER ===== */
.slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:fade 24s infinite;
transform:scale(1.02);
}

/* CAMBIA SOLO ESTOS NOMBRES SI QUIERES */
.slide:nth-child(1){background-image:url("images/cabeza11.jpg");animation-delay:0s;}
.slide:nth-child(2){background-image:url("images/cabeza12.jpg");animation-delay:6s;}
.slide:nth-child(3){background-image:url("images/cabeza4.jpg");animation-delay:12s;}
.slide:nth-child(4){background-image:url("images/cabeza7.jpg");animation-delay:18s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
24%{opacity:1;}
30%{opacity:0;}
100%{opacity:0;}
}

/* ===== VELO KELLY ===== */
.menu-fade{
position:absolute;
top:0;
left:0;
width:100%;
height:48%;
background:linear-gradient(
to bottom,
rgba(255,255,255,.42) 0%,
rgba(255,255,255,.18) 38%,
rgba(255,255,255,0) 100%
);
opacity:0;
transition:opacity .35s ease;
pointer-events:none;
z-index:8;
}

/* aparece SOLO cuando hover menú */
header:hover + .hero .menu-fade{
opacity:1;
}

/* ===== TEXTO HERO ===== */
.hero-text{
position:absolute;
left:55px;
bottom:55px;
font-size:40px;
font-weight:300;
line-height:1.2;
max-width:760px;
z-index:10;
text-shadow:0 2px 10px rgba(0,0,0,.45);
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
padding:0 18px;
height:68px;
}

.logo{
font-size:19px;
}

nav a{
font-size:10px;
margin-left:10px;
}

.hero{
margin-top:68px;
height:calc(100vh - 68px);
}

.hero-text{
left:18px;
bottom:28px;
font-size:26px;
max-width:90%;
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="hero">

<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>

<div class="menu-fade"></div>

<div class="hero-text">
Painting as an exploration of existence and the infinite
</div>

</section>

</body>
</html>
