<!DOCTYPE HTML>
<html>
<head>
<title>Biography — Ricardo Wagner</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="assets/css/main.css" />

<style>

/* ===== HERO ===== */
.hero-bio{
    position:relative;
    height:70vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* SLIDES */
.hero-slides{
    position:absolute;
    inset:0;
    z-index:1;
}

.hero-slides img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:fadeHero 20s infinite;
}

.hero-slides img:nth-child(1){animation-delay:0s;}
.hero-slides img:nth-child(2){animation-delay:5s;}
.hero-slides img:nth-child(3){animation-delay:10s;}
.hero-slides img:nth-child(4){animation-delay:15s;}

@keyframes fadeHero{
    0%{opacity:0;}
    8%{opacity:1;}
    25%{opacity:1;}
    33%{opacity:0;}
    100%{opacity:0;}
}

/* OVERLAY */
.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.18);
    z-index:2;
}

/* CONTENT */
.hero-content{
    position:relative;
    z-index:3;
}

/* NAME */
.hero-bio h1{
    margin:0;
    transform:translateY(-45px);
    font-size:clamp(2.4rem,6vw,5rem);
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#fff;
}

/* SUBTITLE */
.hero-bio p{
    margin-top:6px;
    transform:translateY(-40px);
    font-size:clamp(.95rem,2vw,1.2rem);
    color:rgba(255,255,255,.9);
}

/* MOBILE */
@media (max-width:768px){

.hero-bio{
height:68vh;
}

.hero-bio h1{
transform:translateY(-60px);
font-size:clamp(2.2rem,10vw,3.8rem);
}

.hero-bio p{
transform:translateY(-52px);
font-size:1rem;
}

}

</style>

</head>

<body>

<div id="page-wrapper">

<header id="header">
<h1><a href="index.html">RICARDO WAGNER</a></h1>
<nav id="nav">
<ul>
<li><a href="index.html">HOME</a></li>
<li><a href="works.html">WORKS</a></li>
<li><a href="biography.html" class="current">BIOGRAPHY</a></li>
<li><a href="contact.html">CONTACT</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero-bio">

<div class="hero-slides">
<img src="images/cabeza13.jpg">
<img src="images/cabeza11.jpg">
<img src="images/cabeza7.jpg">
<img src="images/cabeza12.jpg">
</div>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>RICARDO WAGNER</h1>
<p>Visual Artist — Abstraction, Matter & Infinity</p>
</div>

</section>

</div>

</body>
</html>
