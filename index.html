<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:90px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center; /* menú centrado */
    z-index:1000;
}

/* nombre izquierda */
.logo{
    position:absolute;
    left:60px;
    color:#fff;
    font-size:40px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
}

/* menú centrado */
nav ul{
    display:flex;
    list-style:none;
    gap:50px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    font-size:20px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
}

/* ===== HERO ===== */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* imagen recortada como marcaste */
.hero img{
    position:absolute;
    top:90px; /* debajo del header */
    left:0;
    width:100%;
    height:calc(100vh - 170px); /* recorte inferior */
    object-fit:cover;
}

/* nombre centrado sobre la obra */
.hero-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#fff;
    z-index:2;
}

.hero-text h1{
    font-size:90px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
}

.hero-text p{
    margin-top:14px;
    font-size:34px;
    font-weight:300;
    opacity:.9;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
    .logo{
        font-size:30px;
        left:25px;
    }
    nav ul{
        gap:25px;
    }
    nav ul li a{
        font-size:16px;
    }
    .hero-text h1{
        font-size:58px;
    }
    .hero-text p{
        font-size:24px;
    }
}

@media(max-width:768px){
    header{
        height:75px;
    }

    .logo{
        font-size:26px;
        left:20px;
    }

    nav ul{
        gap:16px;
    }

    nav ul li a{
        font-size:13px;
    }

    .hero img{
        top:75px;
        height:calc(100vh - 140px);
    }

    .hero-text h1{
        font-size:42px;
    }

    .hero-text p{
        font-size:18px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">RICARDO WAGNER</div>

    <nav>
        <ul>
            <li><a href="biography.html">BIOGRAPHY</a></li>
            <li><a href="works.html">WORKS</a></li>
            <li><a href="philosophy.html">PHILOSOPHY</a></li>
            <li><a href="exhibitions.html">EXHIBITIONS</a></li>
            <li><a href="publications.html">PUBLICATIONS</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <img src="watercolors1.jpg" alt="Artwork">

    <div class="hero-text">
        <h1>RICARDO WAGNER</h1>
        <p>Visual Artist — Abstraction, Matter & Infinity</p>
    </div>
</section>

</body>
</html>
