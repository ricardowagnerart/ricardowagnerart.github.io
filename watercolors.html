<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watercolors</title>

<style>

body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
    color:#111;
}

/* HEADER */
.header{
    text-align:center;
    padding:35px 0 25px;
    font-size:42px;
    letter-spacing:12px;
}

.header a{
    color:#9c9c9c;
    text-decoration:none;
}

/* GRID */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:28px;
    padding:20px 40px 60px;
}

.art-item{
    width:30%;
    transition:.35s ease;
    cursor:pointer;
}

.art-item img{
    width:100%;
    display:block;
}

/* FICHA TÉCNICA */
.tech{
    margin-top:12px;
    font-size:14px;
    color:#555;
    line-height:1.5;
}

/* TITULO REDUCIDO 50% */
.tech h3{
    margin:0 0 8px;
    font-size:17px;
    font-style:italic;
    font-weight:normal;
    color:#111;
}

/* HOVER */
.gallery:hover .art-item{
    opacity:.4;
    filter:blur(2px);
}

.gallery .art-item:hover{
    opacity:1;
    filter:none;
}

/* VIEWER */
.viewer{
    position:fixed;
    inset:0;
    background:#f2f2f2;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    overflow:hidden;
}

/* LUPA */
.viewer img{
    max-width:90%;
    max-height:90%;
    cursor:zoom-in;
    transition:transform .2s ease;
}

/* MOBILE */
@media(max-width:900px){

.header{
    font-size:28px;
    letter-spacing:8px;
}

.gallery{
    padding:10px 20px 40px;
}

.art-item{
    width:100%;
}

.tech{
    font-size:11px;
}

.tech h3{
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="header">
    <a href="works.html">RICARDO WAGNER</a>
</div>

<div class="gallery">

<div class="art-item">
<img src="images/watercolors1.jpg" onclick="openViewer(this)">
<div class="tech">
<h3>White Ring</h3>
<p>1963</p>
<p>painted aluminum</p>
<p>70 × 72 × ¼ inches</p>
<p>EK 322</p>
</div>
</div>

<div class="art-item">
<img src="images/watercolors2.jpg" onclick="openViewer(this)">
<div class="tech">
<h3>White Ring</h3>
<p>1963</p>
<p>painted aluminum</p>
<p>70 × 72 × ¼ inches</p>
<p>EK 322</p>
</div>
</div>

<div class="art-item">
<img src="images/watercolors3.jpg" onclick="openViewer(this)">
<div class="tech">
<h3>White Ring</h3>
<p>1963</p>
<p>painted aluminum</p>
<p>70 × 72 × ¼ inches</p>
<p>EK 322</p>
</div>
</div>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
    <img id="viewerImg">
</div>

<script>

const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

function openViewer(img){
    viewer.style.display="flex";
    viewerImg.src = img.src;
}

function closeViewer(){
    viewer.style.display="none";
    viewerImg.style.transform="scale(1)";
}

/* LUPA ZOOM */
viewerImg.addEventListener("mousemove", e=>{
    const rect = viewerImg.getBoundingClientRect();
    const x = (e.clientX - rect.left)/rect.width * 100;
    const y = (e.clientY - rect.top)/rect.height * 100;

    viewerImg.style.transformOrigin = `${x}% ${y}%`;
    viewerImg.style.transform = "scale(2.5)";
});

viewerImg.addEventListener("mouseleave", ()=>{
    viewerImg.style.transform="scale(1)";
});

</script>

</body>
</html>
