<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watercolors</title>

<style>

body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
    color:#111;
}

/* HEADER */
.header{
    text-align:center;
    padding:35px 0 25px;
    font-size:42px;
    letter-spacing:12px;
}

.header a{
    color:#9c9c9c;
    text-decoration:none;
}

/* GRID PC */
.gallery{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.artwork{
    display:flex;
    flex-direction:column;
}

.artwork img{
    width:100%;
    display:block;
}

/* FICHA TECNICA */
.info{
    margin-top:18px;
    color:#8f8f8f;
    font-size:10px;
    line-height:1.6;
}

.info .title{
    font-style:italic;
    color:#222;
    font-size:14px;
}

.info .code{
    font-size:9px;
    letter-spacing:1px;
}

/* COPYRIGHT */
.footer{
    text-align:center;
    margin:40px 0;
    color:#9c9c9c;
    font-size:14px;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

.header{
    font-size:34px;
    letter-spacing:8px;
    padding:25px 0;
}

.gallery{
    display:block;
    width:100%;
}

.artwork{
    margin-bottom:70px;
}

.artwork img{
    width:92%;
    margin:auto;
    display:block;
}

.info{
    width:82%;
    margin:30px auto 0;
    font-size:18px;
    line-height:1.9;
    color:#9a9a9a;
}

.info .title{
    font-size:23px;
    font-style:italic;
    color:#222;
}

.info .code{
    font-size:15px;
}

.footer{
    font-size:24px;
    margin:60px 0;
}

}

</style>
</head>

<body>

</div>

        </div>

    <div class="artwork">

        <div class="info">

</div>

</html>
