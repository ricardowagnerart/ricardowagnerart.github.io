<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  background:#ececec;
  overflow:hidden;
}

/* ===== FULL SCREEN LAYOUT ===== */
.works-page{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;   /* CENTRADO VERTICAL */
  align-items:center;       /* CENTRADO HORIZONTAL */
  position:relative;
}

/* ===== TOP BAR ===== */
.top-name{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  letter-spacing:10px;
  color:#a8a8a8;
  text-decoration:none;
  font-weight:400;
}

.close{
  position:absolute;
  top:24px;
  right:26px;
  font-size:52px;
  color:#000;
  text-decoration:none;
  line-height:1;
}

/* ===== MENU ===== */
.menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:34px; /* separación vertical */
  text-align:center;
}

.menu-title{
  font-size:110px;
  font-weight:300;
  color:#b5b5b5;
  margin-bottom:18px;
}

.menu a{
  text-decoration:none;
  color:#111;
  font-size:72px; /* REDUCIDO */
  font-weight:400;
  transition:transform .2s ease;
}

.menu a:active{
  transform:scale(1.06);
}

/* ===== COPYRIGHT ===== */
.copy{
  position:absolute;
  bottom:80px;
  font-size:52px;
  color:#9c9c9c;
}

/* ===== MOBILE ===== */
@media (max-width:900px){

  .top-name{
    top:22px;
    font-size:14px;
    letter-spacing:8px;
  }

  .close{
    top:14px;
    right:20px;
    font-size:56px;
  }

  .menu{
    gap:26px;
  }

  .menu-title{
    font-size:86px;
    margin-bottom:8px;
  }

  .menu a{
    font-size:64px;
  }

  .copy{
    bottom:70px;
    font-size:42px;
  }
}
</style>
</head>

<body>

<div class="works-page">

  <!-- NOMBRE ARRIBA CON LINK A HOME -->
  <a href="index.html" class="top-name">RICARDO WAGNER</a>

  <!-- X CERRAR -->
  <a href="index.html" class="close">×</a>

  <!-- MENU CENTRADO TOTAL -->
  <div class="menu">
    <div class="menu-title">Works</div>

    <a href="paintings.html">Paintings</a>
    <a href="drawings.html">Drawings</a>
    <a href="watercolors.html">Watercolors</a>
    <a href="photography.html">Photography</a>
  </div>

  <!-- COPYRIGHT -->
  <div class="copy">© Ricardo Wagner</div>

</div>

</body>
</html>
