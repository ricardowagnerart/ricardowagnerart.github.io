<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#efefef;
}

/* =========================
   DESKTOP
========================= */

.desktop-only{
    display:block;
    min-height:100vh;
    position:relative;
    overflow:hidden;
    background:#efefef;
}

.desktop-name{
    text-align:center;
    margin-top:35px;
    font-size:42px;
    letter-spacing:10px;
    color:#000;
    text-decoration:none;
    display:block;
    transition:.3s ease;
}

.desktop-name:hover{
    transform:translateY(-2px);
}

.desktop-menu{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-top:60px;
    font-size:28px;
    color:#111;
}

.desktop-menu a{
    text-decoration:none;
    color:#111;
    transition:.3s;
}

.desktop-menu a:hover{
    opacity:.6;
}

/* SLIDER */

.desktop-slider{
    position:relative;
    width:100%;
    height:45vh;
    margin-top:60px;
    overflow:hidden;
}

.desktop-slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    animation:fade 16s infinite;
}

.desktop-slide:nth-child(1){background-image:url("images/work1.jpg");animation-delay:0s;}
.desktop-slide:nth-child(2){background-image:url("images/work2.jpg");animation-delay:4s;}
.desktop-slide:nth-child(3){background-image:url("images/work3.jpg");animation-delay:8s;}
.desktop-slide:nth-child(4){background-image:url("images/work4.jpg");animation-delay:12s;}

@keyframes fade{
    0%{opacity:0;}
    10%{opacity:1;}
    25%{opacity:1;}
    35%{opacity:0;}
    100%{opacity:0;}
}

.desktop-copy{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#666;
}

/* =========================
   MOBILE
========================= */

.mobile-only{
    display:none;
    min-height:100vh;
    background:#e9e9e9;
    text-align:center;
    padding-top:60px;
}

.mobile-name{
    font-size:30px;
    letter-spacing:8px;
    color:#999;
    text-decoration:none;
    display:block;
    margin-bottom:60px;
}

.mobile-title{
    font-size:72px;
    color:#b5b5b5;
    margin-bottom:40px;
}

.mobile-menu{
    display:flex;
    flex-direction:column;
    gap:35px;
    font-size:54px;
}

.mobile-menu a{
    text-decoration:none;
    color:#111;
    transition:.2s ease;
}

.mobile-menu a:active{
    transform:scale(1.05);
}

.mobile-copy{
    margin-top:80px;
    font-size:22px;
    color:#999;
}

/* =========================
   RESPONSIVE SWITCH
========================= */

@media (max-width:1023px){

.desktop-only{
    display:none;
}

.mobile-only{
    display:block;
}

/* REDUCCIONES QUE PEDISTE */
.mobile-name{
    margin-top:40px;
    font-size:21px; /* -30% */
}

.mobile-title{
    font-size:22px; /* -70% */
}

.mobile-menu{
    font-size:22px; /* -60% */
    gap:30px;
}

.mobile-copy{
    font-size:10px; /* -85% */
}

}

</style>
</head>
