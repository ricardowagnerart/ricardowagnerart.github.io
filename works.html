<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    color:#fff;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:20;
    background:transparent;
}

header a{
    color:#fff;
    text-decoration:none;
    font-weight:700;
    letter-spacing:2px;
    font-size:48px;
    transition:.25s;
}

header a:hover{
    opacity:.85;
}

/* ===== FONDO ===== */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:120%;
    height:100vh;
    background:url("cabeza11.jpg") center center / cover no-repeat;
    opacity:.60;
    animation:pan 24s linear infinite alternate;
    z-index:1;
}

@keyframes pan{
    0%{transform:translateX(-8%);}
    100%{transform:translateX(0%);}
}

/* ===== OVERLAY OSCURO ===== */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:2;
}

/* ===== CONTENIDO ===== */
.works{
    position:relative;
    z-index:10;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.works h1{
    font-size:56px;
    margin-bottom:40px;
    font-weight:700;
}

.menu{
    display:flex;
    flex-direction:row;
    gap:70px;
}

.menu a{
    color:rgba(255,255,255,.65);
    text-decoration:none;
    font-size:52px;
    font-weight:400;
    transition:.25s;
}

.menu a:hover{
    color:#fff;
    transform:scale(1.08);
}

.menu a:active{
    transform:scale(1.12);
}

/* ===== MOBILE ===== */
@media (max-width:900px){

    header{
        height:60px;
        top:35px; /* baja el nombre */
    }

    header a{
        font-size:52px;
        letter-spacing:1px;
    }

    .bg{
        width:140%;
        height:100vh;
        animation:panMobile 18s linear infinite alternate;
    }

    @keyframes panMobile{
        0%{transform:translateX(0);}
        100%{transform:translateX(-12%);}
    }

    .works{
        justify-content:center;
        padding-top:40px;
    }

    .works h1{
        font-size:34px;
        margin-bottom:35px;
    }

    .menu{
        flex-direction:column;
        gap:38px; /* separación mayor */
    }

    .menu a{
        font-size:48px; /* más pequeño móvil */
    }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
    <a href="index.html">RICARDO WAGNER</a>
</header>

<section class="works">
    <h1>Works</h1>

    <nav class="menu">
        <a href="#">Paintings</a>
        <a href="#">Drawings</a>
        <a href="#">Watercolors</a>
        <a href="#">Photography</a>
    </nav>
</section>

</body>
</html>
