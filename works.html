<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== TOP BAR ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

header a{
color:#fff;
text-decoration:none;
font-size:42px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== HERO ===== */

.works-hero{
position:relative;
width:100%;
height:85vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:140px;
overflow:hidden;
}

/* ===== SINGLE BACKGROUND IMAGE ===== */

.bg{
position:absolute;
inset:0;
background:url("cabeza11.jpg") center center / cover no-repeat;
opacity:.40; /* 60% transparente */
z-index:0;
}

/* ===== CENTER MENU ===== */

.works-menu{
position:relative;
z-index:2;
text-align:center;
}

.works-menu h1{
font-size:44px; /* 50% reducido PC */
color:#111;
margin-bottom:35px;
}

.menu-line{
display:flex;
gap:40px;
justify-content:center;
align-items:center;
}

.menu-line a{
font-size:32px; /* 50% reducido PC */
color:#7d7d7d;
text-decoration:none;
transition:.25s ease;
white-space:nowrap;
}

.menu-line a:hover{
color:#000;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

header{
height:70px;
}

header a{
font-size:28px;
}

.works-hero{
height:auto;
padding-top:110px;
padding-bottom:70px;
}

.works-menu h1{
font-size:30px; /* 30% menos adicional */
margin-bottom:20px;
}

.menu-line{
flex-direction:column;
gap:14px;
}

.menu-line a{
font-size:22px; /* 30% menos adicional */
}

}

</style>
</head>

<body>

<header>
<a href="index.html">RICARDO WAGNER</a>
</header>

<section class="works-hero">

<div class="bg"></div>

<div class="works-menu">
<h1>Works</h1>

<div class="menu-line">
<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</div>

</section>

</body>
</html>
