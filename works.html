<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
color:#111;
opacity:0;
animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{to{opacity:1;}}

/* ===== HEADER ===== */
header{
height:74px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 52px;
position:fixed;
top:0;left:0;
width:100%;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
text-decoration:none;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:24px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}

nav a:hover{opacity:.55;}

nav a.active{
opacity:.45;
pointer-events:none;
}

/* ===== PAGE ===== */
.page{
max-width:1300px;
margin:120px auto 70px;
padding:0 35px;
}

h1{
font-size:58px;
font-weight:300;
margin-bottom:45px;
}

/* ===== GALLERY ===== */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.work{
position:relative;
overflow:hidden;
background:#f3f3f3;
}

.work img{
width:100%;
display:block;
transition:transform .6s ease;
}

.work:hover img{
transform:scale(1.02);
}

.info{
position:absolute;
left:0;
bottom:0;
width:100%;
padding:16px 20px;
background:linear-gradient(to top,rgba(0,0,0,.65),transparent);
color:#fff;
font-size:13px;
opacity:0;
transition:.3s;
}

.work:hover .info{
opacity:1;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
height:68px;
padding:0 18px;
}

.logo{font-size:19px;}

nav a{
font-size:10px;
margin-left:10px;
}

.page{
margin:100px auto 40px;
padding:0 18px;
}

h1{
font-size:40px;
margin-bottom:25px;
}

.gallery{
grid-template-columns:1fr;
gap:20px;
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html" class="active">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="page">

<h1>Works</h1>

<div class="gallery">

<div class="work">
<img src="images/cabeza11.jpg" alt="">
<div class="info">Untitled — Oil on canvas</div>
</div>

<div class="work">
<img src="images/cabeza12.jpg" alt="">
<div class="info">Untitled — Mixed media</div>
</div>

<div class="work">
<img src="images/cabeza4.jpg" alt="">
<div class="info">Untitled — Abstract composition</div>
</div>

<div class="work">
<img src="images/cabeza7.jpg" alt="">
<div class="info">Untitled — Study</div>
</div>

</div>

</section>

<script>
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){
const url=this.getAttribute("href");
if(url && !url.startsWith("#")){
e.preventDefault();
document.body.style.opacity="0";
setTimeout(()=>{window.location=url;},250);
}
});
});
</script>

</body>
</html>
