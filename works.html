<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#e9e9e9;
    color:#111;
}

/* ===== DESKTOP (NO TOCAR) ===== */
.desktop-only{display:block;}
.mobile-only{display:none;}

.pc-wrap{
    width:100%;
    min-height:100vh;
    background:#f3f3f3;
    position:relative;
}
.pc-header{
    text-align:center;
    padding-top:35px;
    letter-spacing:10px;
    font-size:48px;
    color:#2b2b2b;
    font-weight:300;
}
.pc-close{
    position:absolute;
    right:40px;
    top:35px;
    font-size:48px;
    text-decoration:none;
    color:#111;
}
.pc-menu{
    margin-top:55px;
    display:flex;
    justify-content:center;
    gap:110px;
}
.pc-menu a{
    text-decoration:none;
    color:#9b9b9b;
    font-size:46px;
    font-weight:300;
}

/* ===== MOBILE ===== */
@media (max-width:900px){

.desktop-only{display:none;}
.mobile-only{display:flex;}

.mobile-wrap{
    width:100%;
    min-height:100vh;
    background:#e9e9e9;
    flex-direction:column;
    align-items:center;
    position:relative;
    padding-top:70px; /* nombre más abajo (2 espacios) */
}

/* nombre */
.mobile-name{
    font-size:21px; /* -30% */
    letter-spacing:7px;
    color:#9a9a9a;
    text-decoration:none;
    font-weight:300;
    margin-bottom:40px;
}

/* WORK */
.mobile-title{
    font-size:28px; /* -70% */
    color:#b0b0b0;
    font-weight:300;
    margin-bottom:28px;
    cursor:pointer;
    transition:.25s;
}

/* menú */
.mobile-menu{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    transition:transform .35s ease;
}

.mobile-menu a{
    text-decoration:none;
    color:#111;
    font-size:26px; /* -60% */
    font-weight:400;
    transition:transform .22s ease, opacity .22s ease;
}

/* movimiento elegante al tocar */
.mobile-menu a:active{
    transform:scale(1.08);
    opacity:.75;
}

/* movimiento del bloque cuando tocan WORK */
.mobile-menu.menu-bounce{
    transform:translateY(8px);
}

/* copyright */
.mobile-copy{
    margin-top:55px;
    font-size:8px; /* -85% */
    color:#9a9a9a;
    font-weight:300;
}

}
</style>
</head>

<body>

<!-- ===== DESKTOP ===== -->
<div class="pc-wrap desktop-only">
    <div class="pc-header">RICARDO WAGNER</div>
    <a class="pc-close" href="index.html">×</a>

    <div class="pc-menu">
        <a href="biography.html">Biography</a>
        <a href="works.html">Works</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="publications.html">Publications</a>
        <a href="statement.html">Foundation</a>
    </div>
</div>

<!-- ===== MOBILE ===== -->
<div class="mobile-wrap mobile-only">

    <!-- 11. nombre vuelve a HOME -->
    <a class="mobile-name" href="index.html">RICARDO WAGNER</a>

    <!-- 12. click mueve el menú -->
    <div class="mobile-title" id="worksTitle">Works</div>

    <div class="mobile-menu" id="worksMenu">
        <a href="#">Paintings</a>
        <a href="#">Drawings</a>
        <a href="#">Watercolors</a>
        <a href="#">Photography</a>
        <a href="#">Available Works</a> <!-- Obras disponibles -->
    </div>

    <div class="mobile-copy">© Ricardo Wagner</div>

</div>

<script>
/* movimiento elegante cuando tocan WORK */
const title = document.getElementById("worksTitle");
const menu  = document.getElementById("worksMenu");

if(title){
  title.addEventListener("click", ()=>{
    menu.classList.add("menu-bounce");
    setTimeout(()=>menu.classList.remove("menu-bounce"),300);
  });
}
</script>

</body>
</html>
