<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
color:#111;
opacity:0;
animation:fadeIn .8s ease forwards;
}

@keyframes fadeIn{to{opacity:1;}}

/* ===== HEADER ===== */
header{
height:74px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 52px;
position:fixed;
top:0;left:0;
width:100%;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:600;
color:#fff;
text-decoration:none;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:24px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}
nav a:hover{opacity:.55;}

/* ===== PAGE ===== */
.page{
max-width:1500px;
margin:120px auto 80px;
padding:0 40px;
}

h1{
font-size:64px;
font-weight:300;
margin-bottom:60px;
}

/* ===== CURATORIAL FLOW ===== */
.works{
display:flex;
flex-direction:column;
gap:90px;
}

.work{
position:relative;
overflow:hidden;
}

.work img{
width:100%;
display:block;
transition:transform .8s ease;
}

/* visual rhythm */
.large img{max-height:950px;object-fit:cover;}
.medium img{max-height:720px;object-fit:cover;}
.small img{max-height:560px;object-fit:cover;}

.work:hover img{
transform:scale(1.015);
}

/* info */
.info{
position:absolute;
left:0;
bottom:0;
width:100%;
padding:20px 25px;
background:linear-gradient(to top,rgba(0,0,0,.65),transparent);
color:#fff;
font-size:13px;
letter-spacing:.5px;
opacity:0;
transition:.3s;
}

.work:hover .info{
opacity:1;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

header{
height:68px;
padding:0 18px;
}

.logo{font-size:19px;}

nav a{
font-size:10px;
margin-left:10px;
}

.page{
margin:100px auto 40px;
padding:0 18px;
}

h1{
font-size:42px;
margin-bottom:35px;
}

.works{
gap:30px;
}

.work img{
max-height:none !important;
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="page">

<h1>Works</h1>

<div class="works">

<div class="work large">
<img src="images/cabeza11.jpg" alt="">
<div class="info">Untitled — Oil on canvas</div>
</div>

<div class="work medium">
<img src="images/cabeza12.jpg" alt="">
<div class="info">Untitled — Mixed media</div>
</div>

<div class="work large">
<img src="images/cabeza4.jpg" alt="">
<div class="info">Untitled — Abstract series</div>
</div>

<div class="work small">
<img src="images/cabeza7.jpg" alt="">
<div class="info">Untitled — Composition study</div>
</div>

</div>

</section>

<script>
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){
const url=this.getAttribute("href");
if(url && !url.startsWith("#")){
e.preventDefault();
document.body.style.opacity="0";
setTimeout(()=>{window.location=url;},300);
}
});
});
</script>

</body>
</html>
