<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

header a{
color:#fff;
text-decoration:none;
font-size:30px; /* REDUCIDO PC */
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== HERO ===== */

.works-hero{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
padding-top:80px;
}

/* ===== BACKGROUND (MISMO FORMATO) ===== */

.bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("./images/cabeza11.jpg") center center / cover no-repeat;
opacity:0.40;
animation:pan 18s linear infinite alternate;
z-index:0;
}

@keyframes pan{
0%{transform:translateX(0);}
100%{transform:translateX(-6%);}
}

/* ===== MENU ===== */

.works-menu{
position:relative;
z-index:2;
text-align:center;
}

.works-menu h1{
font-size:36px;
color:#111;
margin-bottom:20px;
}

.menu-line{
display:flex;
gap:28px;
justify-content:center;
align-items:center;
}

.menu-line a{
font-size:24px;
color:#8a8a8a;
text-decoration:none;
transition:.25s ease;
}

.menu-line a:hover{
color:#fff;
transform:scale(1.05);
}

.menu-line a:active{
transform:scale(1.10);
color:#fff;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

header{
height:70px;
}

header a{
font-size:20px; /* NOMBRE MÁS PEQUEÑO MÓVIL */
letter-spacing:0.5px;
}

.works-hero{
height:100vh;
padding-top:70px;
}

.bg{
width:100%;
height:100%;
background-position:center center;
animation:panMobile 16s linear infinite alternate;
opacity:0.40;
}

@keyframes panMobile{
0%{transform:translateX(0);}
100%{transform:translateX(-8%);}
}

.works-menu h1{
font-size:24px;
margin-bottom:14px;
}

.menu-line{
flex-direction:column;
gap:10px;
}

.menu-line a{
font-size:20px; /* TEXTOS MÁS PEQUEÑOS MÓVIL */
color:#9a9a9a;
}

.menu-line a:active{
transform:scale(1.08);
color:#fff;
}

}

</style>
</head>

<body>

<header>
<a href="index.html">RICARDO WAGNER</a>
</header>

<section class="works-hero">

<div class="bg"></div>

<div class="works-menu">
<h1>Works</h1>

<div class="menu-line">
<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</div>

</section>

</body>
</html>
