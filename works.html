<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

header a{
color:#fff;
text-decoration:none;
font-size:42px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== HERO ===== */

.works-hero{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* ===== MOVING BACKGROUND ===== */

.bg{
position:absolute;
top:0;
left:0;
width:120%;
height:100%;
background:url("./images/cabeza11.jpg") center center / cover no-repeat;
opacity:0.40;
animation:pan 20s linear infinite alternate;
z-index:0;
}

@keyframes pan{
0%{transform:translateX(0);}
100%{transform:translateX(-8%);}
}

/* ===== MENU ===== */

.works-menu{
position:relative;
z-index:2;
text-align:center;
}

.works-menu h1{
font-size:44px;
color:#111;
margin-bottom:30px;
}

.menu-line{
display:flex;
gap:40px;
justify-content:center;
align-items:center;
}

.menu-line a{
font-size:32px;
color:#7d7d7d;
text-decoration:none;
transition:.25s ease;
}

/* hover desktop */
.menu-line a:hover{
color:#fff;
transform:scale(1.06);
}

/* touch effect (NO black text) */
.menu-line a:active{
transform:scale(1.12);
color:#fff;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

header{
height:85px;
}

header a{
font-size:56px;
line-height:0.9;
text-align:center;
}

.works-hero{
height:100vh;
align-items:center;
padding-top:70px;
}

/* full screen background mobile */
.bg{
width:140%;
height:100%;
background-position:center center;
animation:panMobile 18s linear infinite alternate;
opacity:0.40;
}

@keyframes panMobile{
0%{transform:translateX(0);}
100%{transform:translateX(-12%);}
}

.works-menu{
width:100%;
text-align:center;
}

.works-menu h1{
font-size:32px;
margin-bottom:22px;
color:#111;
}

/* centered vertical menu mobile */
.menu-line{
flex-direction:column;
gap:18px;
}

.menu-line a{
font-size:44px;
color:#9a9a9a;
}

/* touch zoom mobile */
.menu-line a:active{
transform:scale(1.15);
color:#fff;
}

}

</style>
</head>

<body>

<header>
<a href="index.html">RICARDO WAGNER</a>
</header>

<section class="works-hero">

<div class="bg"></div>

<div class="works-menu">
<h1>Works</h1>

<div class="menu-line">
<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</div>

</section>

</body>
</html>
