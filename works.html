<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#efefef;
}

/* =========================
   MOBILE (NO TOCAR)
========================= */

@media (max-width:1023px){

.mobile-only{display:block;}
.desktop-only{display:none;}

}

/* =========================
   DESKTOP ONLY (PC)
========================= */

@media (min-width:1024px){

.mobile-only{display:none;}
.desktop-only{display:block;}

/* ===== HEADER ===== */

.desktop-header{
    width:100%;
    padding:30px 0 10px;
    text-align:center;
}

/* nombre NEGRO */
.desktop-header a{
    text-decoration:none;
    color:#000;
    letter-spacing:10px;
    font-size:42px;
    font-weight:300;
    display:inline-block;
    transition:all .35s ease;
}

.desktop-header a:hover{
    transform:translateY(-3px);
    opacity:.75;
}

/* ===== MENU (sin Works) ===== */

.desktop-works{
    width:100%;
    text-align:center;
    margin-top:10px; /* subido hacia arriba */
}

/* menú reducido 40% */
.desktop-menu{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
    margin-bottom:35px;
}

.desktop-menu a{
    text-decoration:none;
    color:#2b2b2b;
    font-size:23px; /* reducción */
    font-weight:300;
    transition:opacity .3s ease;
}

.desktop-menu a:hover{
    opacity:.6;
}

/* ===== SLIDERS ===== */

.slider-wrap{
    width:100%;
    height:500px;
    position:relative;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    animation:fade 16s infinite;
}

.slide:nth-child(1){background-image:url('images/work1.jpg');animation-delay:0s;}
.slide:nth-child(2){background-image:url('images/work2.jpg');animation-delay:4s;}
.slide:nth-child(3){background-image:url('images/work3.jpg');animation-delay:8s;}
.slide:nth-child(4){background-image:url('images/work4.jpg');animation-delay:12s;}

@keyframes fade{
    0%{opacity:0;}
    5%{opacity:1;}
    25%{opacity:1;}
    30%{opacity:0;}
    100%{opacity:0;}
}

/* ===== COPYRIGHT ===== */

.desktop-copy{
    text-align:center;
    font-size:14px;
    color:#8d8d8d;
    padding:25px 0 40px;
}

}

</style>
</head>

<body>

<!-- =========================
     DESKTOP VERSION
========================= -->

<div class="desktop-only">

<header class="desktop-header">
    <a href="index.html">RICARDO WAGNER</a>
</header>

<section class="desktop-works">

    <!-- Works eliminado -->

    <nav class="desktop-menu">
        <a href="#">Paintings</a>
        <a href="#">Drawings</a>
        <a href="#">Watercolors</a>
        <a href="#">Photography</a>
        <a href="#">Available Works</a>
    </nav>

</section>

<section class="slider-wrap">
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
</section>

<div class="desktop-copy">
    © Ricardo Wagner
</div>

</div>

<!-- =========================
     MOBILE VERSION (NO TOCAR)
========================= -->

<div class="mobile-only">
    <!-- tu versión móvil actual permanece igual -->
</div>

</body>
</html>
