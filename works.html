<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Works — Ricardo Wagner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#fff;
overflow-x:hidden;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

nav{
display:flex;
gap:60px;
}

nav a{
color:#fff;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== WORKS HERO ===== */

.works-hero{
position:relative;
width:100%;
height:85vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:140px;
overflow:hidden;
}

.works-bg{
position:absolute;
inset:0;
background:url("cabeza11.jpg") center center / cover no-repeat;
opacity:0.4;
z-index:0;
}

.works-menu{
position:relative;
z-index:2;
text-align:center;
}

.works-menu h1{
font-size:80px;
margin-bottom:50px;
color:#111;
}

.works-menu a{
display:block;
font-size:64px;
color:#888;
text-decoration:none;
margin:25px 0;
transition:all .3s ease;
}

.works-menu a:hover{
color:#000;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

header{
height:70px;
}

nav{
gap:20px;
}

nav a{
font-size:10px;
}

.works-hero{
height:auto;
padding-top:100px;
padding-bottom:80px;
align-items:center;
}

.works-menu h1{
font-size:40px;
}

.works-menu a{
font-size:32px;
margin:18px 0;
}

}

</style>
</head>

<body>

<header>
<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="works-hero">

<div class="works-bg"></div>

<div class="works-menu">
<h1>Works</h1>

<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</section>

</body>
</html>
