<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== HEADER ===== */

header{
position:absolute;
top:40px; /* MÁS ABAJO */
left:0;
width:100%;
height:70px;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
background:transparent;
}

header a{
color:#fff;
text-decoration:none;
font-size:20px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== HERO ===== */

.works-hero{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("./images/cabeza11.jpg") center center / cover no-repeat;
opacity:0.45;
animation:pan 12s linear infinite alternate;
z-index:0;
}

/* IZQUIERDA → DERECHA */
@keyframes pan{
0%{transform:translateX(-12%);}
100%{transform:translateX(0);}
}

.works-menu{
position:relative;
z-index:2;
text-align:center;
margin-top:90px;
}

.works-menu h1{
font-size:24px;
color:#111;
margin-bottom:30px;
}

.menu-line{
display:flex;
flex-direction:column;
gap:34px; /* MÁS SEPARACIÓN */
justify-content:center;
align-items:center;
}

.menu-line a{
font-size:20px;
color:#9a9a9a;
text-decoration:none;
transition:.25s ease;
}

.menu-line a:hover{
color:#fff;
transform:scale(1.05);
}

.menu-line a:active{
transform:scale(1.08);
color:#fff;
}

/* ===== DESKTOP ===== */

@media(min-width:769px){

header{
top:28px;
}

header a{
font-size:18px;
}

.works-menu{
margin-top:60px;
}

.works-menu h1{
font-size:30px;
margin-bottom:26px;
}

.menu-line{
flex-direction:row;
gap:55px;
}

.menu-line a{
font-size:16px;
}

.bg{
opacity:0.40;
animation:panDesktop 16s linear infinite alternate;
}

/* IZQUIERDA → DERECHA */
@keyframes panDesktop{
0%{transform:translateX(-8%);}
100%{transform:translateX(0);}
}

}

</style>
</head>

<body>

<header>
<a href="index.html">RICARDO WAGNER</a>
</header>

<section class="works-hero">

<div class="bg"></div>

<div class="works-menu">
<h1>Works</h1>

<div class="menu-line">
<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</div>

</section>

</body>
</html>
