<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#ededed;
color:#111;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
z-index:999;
}

.logo{
font-size:58px;
font-weight:800;
line-height:0.9;
color:#fff;
text-decoration:none;
display:block;
}

/* ===== MENU BUTTON ===== */

.menu-btn{
font-size:38px;
color:#fff;
cursor:pointer;
user-select:none;
}

/* ===== OVERLAY MENU (ESTILO KELLY) ===== */

.menu-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ededed;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
opacity:0;
pointer-events:none;
transition:opacity .35s ease;
z-index:1000;
}

.menu-overlay.active{
opacity:1;
pointer-events:auto;
}

.menu-top{
width:100%;
display:flex;
justify-content:center;
position:relative;
margin-bottom:40px;
}

.menu-title{
font-size:38px;
letter-spacing:8px;
color:#999;
font-weight:300;
}

.menu-close{
position:absolute;
right:35px;
top:-5px;
font-size:48px;
cursor:pointer;
color:#111;
}

/* ===== MENU LINKS ===== */

.menu-group{
text-align:center;
margin-bottom:45px;
}

.menu-group h2{
font-size:64px;
font-weight:300;
color:#999;
margin-bottom:20px;
}

.menu-group a{
display:block;
text-decoration:none;
color:#111;
font-size:48px;
margin:18px 0;
transition:opacity .25s;
}

.menu-group a:hover{
opacity:.6;
}

/* ===== CONTENT ===== */

.content{
padding-top:120px;
max-width:1200px;
margin:auto;
padding-left:40px;
padding-right:40px;
}

.section-title{
font-size:72px;
margin-bottom:60px;
font-weight:400;
}

.work-item{
font-size:60px;
color:#888;
margin-bottom:40px;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

header{
height:80px;
padding:0 20px;
}

.logo{
font-size:70px;
line-height:0.85;
}

.menu-btn{
font-size:34px;
}

.menu-title{
font-size:34px;
letter-spacing:6px;
}

.menu-close{
font-size:42px;
right:20px;
}

.menu-group h2{
font-size:58px;
}

.menu-group a{
font-size:48px;
}

.content{
padding-top:100px;
padding-left:25px;
padding-right:25px;
}

.section-title{
font-size:72px;
}

.work-item{
font-size:68px;
}

}

</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO<br>WAGNER</a>
<div class="menu-btn" onclick="openMenu()">☰</div>
</header>

<!-- MENU -->
<div class="menu-overlay" id="menu">

<div class="menu-top">
<div class="menu-title">RICARDO WAGNER</div>
<div class="menu-close" onclick="closeMenu()">×</div>
</div>

<div class="menu-group">
<h2>Biography</h2>
<a href="biography.html">Biography</a>
</div>

<div class="menu-group">
<h2>Works</h2>
<a href="works.html">Highlights</a>
</div>

<div class="menu-group">
<h2>Exhibitions</h2>
<a href="exhibitions.html">Current & Upcoming</a>
<a href="exhibitions.html">Highlights</a>
<a href="exhibitions.html">Past</a>
</div>

<div class="menu-group">
<h2>Publications</h2>
<a href="publications.html">Highlights</a>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<h1 class="section-title">Works</h1>

<div class="work-item">Paintings</div>
<div class="work-item">Drawings</div>
<div class="work-item">Watercolors</div>
<div class="work-item">Photography</div>
<div class="work-item">Obras disponibles</div>

</div>

<script>
function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}
</script>

</body>
</html>
