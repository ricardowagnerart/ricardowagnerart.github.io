<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow-x:hidden;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

nav{
display:flex;
gap:55px;
}

nav a{
color:#fff;
text-decoration:none;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
}

/* ===== HERO ===== */

.works-hero{
position:relative;
width:100%;
height:85vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:140px;
overflow:hidden;
}

/* slider background */

.slider{
position:absolute;
inset:0;
z-index:0;
}

.slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:fade 20s infinite;
filter:brightness(0.9);
}

.slide:nth-child(1){background-image:url("cabeza11.jpg");animation-delay:0s;}
.slide:nth-child(2){background-image:url("cabeza12.jpg");animation-delay:5s;}
.slide:nth-child(3){background-image:url("cabeza4.jpg");animation-delay:10s;}
.slide:nth-child(4){background-image:url("cabeza7.jpg");animation-delay:15s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:.4;}
25%{opacity:.4;}
30%{opacity:0;}
100%{opacity:0;}
}

/* overlay white layer */
.slider::after{
content:"";
position:absolute;
inset:0;
background:rgba(255,255,255,.6);
}

/* ===== MENU CENTER ===== */

.works-menu{
position:relative;
z-index:2;
text-align:center;
}

.works-menu h1{
font-size:88px;
color:#111;
margin-bottom:60px;
}

/* PC = EN UNA SOLA LÍNEA */
.menu-line{
display:flex;
gap:70px;
justify-content:center;
align-items:center;
}

.menu-line a{
font-size:64px;
color:#8a8a8a;
text-decoration:none;
transition:.25s ease;
white-space:nowrap;
}

.menu-line a:hover{
color:#000;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

header{height:70px;}

nav{
gap:20px;
}

nav a{
font-size:10px;
}

.works-hero{
height:auto;
padding-top:110px;
padding-bottom:80px;
align-items:center;
}

.works-menu h1{
font-size:42px;
margin-bottom:30px;
}

/* móvil vertical */
.menu-line{
flex-direction:column;
gap:20px;
}

.menu-line a{
font-size:32px; /* 50% aprox */
}

}

</style>
</head>

<body>

<header>
<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="works-hero">

<div class="slider">
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
</div>

<div class="works-menu">
<h1>Works</h1>

<div class="menu-line">
<a href="#">Paintings</a>
<a href="#">Drawings</a>
<a href="#">Watercolors</a>
<a href="#">Photography</a>
</div>

</div>

</section>

</body>
</html>
