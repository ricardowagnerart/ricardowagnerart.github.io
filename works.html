<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
color:#111;
}

/* ===== HEADER ===== */
header{
height:78px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 55px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.12);
}

.logo{
font-size:28px;
font-weight:600;
color:#fff;
text-decoration:none;
white-space:nowrap;
}

nav{
display:flex;
align-items:center;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:26px;
font-size:12px;
font-weight:500;
letter-spacing:.9px;
text-transform:uppercase;
opacity:.9;
transition:.3s;
}

nav a:hover{
opacity:.55;
}

/* ===== PAGE ===== */
.page{
max-width:1400px;
margin:130px auto 60px;
padding:0 40px;
}

h1{
font-size:72px;
font-weight:300;
margin-bottom:50px;
letter-spacing:-1px;
}

/* ===== GRID ===== */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:28px;
}

.work{
position:relative;
overflow:hidden;
background:#eee;
}

.work img{
width:100%;
display:block;
transition:transform .5s ease;
}

/* hover */
.work:hover img{
transform:scale(1.03);
}

.work-info{
position:absolute;
left:0;
bottom:0;
width:100%;
padding:18px 20px;
background:linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0));
color:#fff;
font-size:14px;
opacity:0;
transition:.3s;
}

.work:hover .work-info{
opacity:1;
}

/* ===== MOBILE ===== */
@media(max-width:1000px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:700px){

header{
padding:0 18px;
height:68px;
}

.logo{
font-size:19px;
}

nav a{
font-size:10px;
margin-left:10px;
}

.page{
margin:110px auto 40px;
padding:0 20px;
}

h1{
font-size:42px;
margin-bottom:30px;
}

.gallery{
grid-template-columns:1fr;
gap:20px;
}
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">RICARDO WAGNER</a>

<nav>
<a href="biography.html">Biography</a>
<a href="works.html">Works</a>
<a href="philosophy.html">Philosophy</a>
<a href="exhibitions.html">Exhibitions</a>
<a href="publications.html">Publications</a>
</nav>
</header>

<section class="page">

<h1>Works</h1>

<div class="gallery">

<div class="work">
<img src="images/cabeza11.jpg" alt="">
<div class="work-info">Untitled — Oil on canvas</div>
</div>

<div class="work">
<img src="images/cabeza12.jpg" alt="">
<div class="work-info">Untitled — Mixed media</div>
</div>

<div class="work">
<img src="images/cabeza4.jpg" alt="">
<div class="work-info">Untitled — Acrylic on canvas</div>
</div>

<div class="work">
<img src="images/cabeza7.jpg" alt="">
<div class="work-info">Untitled — Series</div>
</div>

<div class="work">
<img src="images/cabeza11.jpg" alt="">
<div class="work-info">Untitled — Abstract study</div>
</div>

<div class="work">
<img src="images/cabeza12.jpg" alt="">
<div class="work-info">Untitled — Composition</div>
</div>

</div>

</section>

</body>
</html>
