<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works – Ricardo Wagner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#e9e9e9;
    color:#111;
}

/* =======================
   DESKTOP (PC)
======================= */
.desktop-only{display:block;}
.mobile-only{display:none;}

.pc-wrap{
    width:100%;
    min-height:100vh;
    background:#f3f3f3;
    position:relative;
}

.pc-header{
    text-align:center;
    padding-top:35px;
    letter-spacing:10px;
    font-size:48px;
    color:#2b2b2b;
    font-weight:300;
}

.pc-close{
    position:absolute;
    right:40px;
    top:35px;
    font-size:48px;
    text-decoration:none;
    color:#111;
}

.pc-menu{
    margin-top:55px;
    display:flex;
    justify-content:center;
    gap:110px;
}

.pc-menu a{
    text-decoration:none;
    color:#9b9b9b;
    font-size:46px;
    font-weight:300;
    transition:.25s;
}

.pc-menu a:hover{
    color:#111;
}

/* =======================
   MOBILE
======================= */
@media (max-width: 900px){

.desktop-only{display:none;}
.mobile-only{display:flex;}

.mobile-wrap{
    width:100%;
    min-height:100vh;
    background:#e9e9e9;
    flex-direction:column;
    align-items:center;
    padding-top:28px;
    position:relative;
}

.mobile-top{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.mobile-name{
    font-size:30px;
    letter-spacing:8px;
    color:#9a9a9a;
    text-decoration:none;
    font-weight:300;
}

.mobile-close{
    position:absolute;
    right:28px;
    top:-4px;
    font-size:52px;
    text-decoration:none;
    color:#111;
}

.mobile-title{
    margin-top:40px;
    font-size:92px;
    color:#b0b0b0;
    font-weight:300;
}

.mobile-menu{
    margin-top:35px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
}

.mobile-menu a{
    text-decoration:none;
    color:#111;
    font-size:66px;   /* REDUCIDO */
    font-weight:400;
    transition:.2s;
}

.mobile-menu a:active{
    transform:scale(1.05);
}

.mobile-copy{
    margin-top:70px;
    font-size:52px;
    color:#9a9a9a;
    font-weight:300;
}
}
</style>
</head>

<body>

     DESKTOP VERSION
======================= -->
<div class="pc-wrap desktop-only">

    <div class="pc-header">RICARDO WAGNER</div>
    <a class="pc-close" href="index.html">×</a>

    <div class="pc-menu">
        <a href="biography.html">Biography</a>

        <a href="exhibitions.html">Exhibitions</a>
        <a href="publications.html">Publications</a>
        <a href="statement.html">Foundation</a>
    </div>

</div>

<!-- =======================
     MOBILE VERSION
======================= -->
<div class="mobile-wrap mobile-only">

    <div class="mobile-top">
        <a class="mobile-name" href="index.html">RICARDO WAGNER</a>
        <a class="mobile-close" href="index.html">×</a>
    </div>

    <div class="mobile-title">Works</div>

    <div class="mobile-menu">
        <a href="#">Paintings</a>
        <a href="#">Drawings</a>
        <a href="#">Watercolors</a>
        <a href="#">Photography</a>
    </div>

    <div class="mobile-copy">© Ricardo Wagner</div>

</div>

</body>
</html>
