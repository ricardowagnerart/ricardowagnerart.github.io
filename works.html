@media (min-width:901px){

@media (max-width:900px){

        width:100%;
        background:#e9e9e9;
        padding:22px 0;
        margin-bottom:25px;
    }

    .mobile-header a{
        text-decoration:none;
        color:#9c9c9c;
        font-size:38px;
        letter-spacing:10px;
        display:inline-block;
        transition:all .35s ease;
    }

    .mobile-header a:active{
        transform:scale(.97);
        opacity:.75;
    }

    .works-title{
        color:#c2c2c2;
        font-size:56px;
        margin:30px 0;
    }

    .menu{

    }

    .menu a{
        text-decoration:none;
        color:#111;
    }

        font-size:30px;

    .socials a{

        text-decoration:none;
    }

    .copyright{
